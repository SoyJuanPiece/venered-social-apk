<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería Multimedia con Telegram</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Galería Multimedia</h1>
      <p>Sube tus imágenes y audios. Se almacenarán en un canal de Telegram y se mostrarán aquí.</p>
    </header>
  
    <main>
      <div class="upload-container card">
        <h2>Sube un nuevo archivo</h2>
        <form id="upload-form" enctype="multipart/form-data">
          <input type="file" id="file-input" name="media" accept="image/*,audio/*" required>
          <button type="submit">Subir Archivo</button>
        </form>
        <div id="upload-status"></div>
      </div>
  
      <div class="gallery-container">
        <h2>Tu Galería</h2>
        <div id="gallery">
          <!-- Los archivos se cargarán aquí dinámicamente -->
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
