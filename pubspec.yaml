name: venered_social
description: Aplicación de red social tipo Instagram/Threads en Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0' # Ajustado para la versión de Dart en Flutter 3.19.x

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.0 # Versión corregida y actualizada
  image_picker: ^1.1.2     # Versión corregida y actualizada
  transparent_image: ^2.0.1 # Added for FadeInImage placeholder
  shared_preferences: ^2.2.2 # Added for theme persistence
  share_plus: ^10.1.4 # Added for sharing posts
  app_links: ^6.3.2 # Added for Deep Linking
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.2
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
