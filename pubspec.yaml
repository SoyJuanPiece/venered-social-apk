name: venered_social
description: Aplicación de red social tipo Instagram/Threads en Flutter.
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.3.0 <4.0.0' # Ajustado para la versión de Dart en Flutter 3.19.x

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  supabase_flutter: ^2.5.0 # Versión corregida y actualizada
  shared_preferences: ^2.2.2 # Added for theme persistence
  path_provider: ^2.1.3
  image_picker: ^1.1.2
  http: ^1.1.0
  transparent_image: ^2.0.1
  firebase_messaging: ^16.1.1
  firebase_core: ^4.4.0
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
