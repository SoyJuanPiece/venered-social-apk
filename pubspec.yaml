name: venered_social
description: Aplicación de red social tipo Instagram/Threads en Flutter.
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  supabase_flutter: ^2.5.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.3
  image_picker: ^1.1.2
  http: ^1.1.0
  transparent_image: ^2.0.1
  firebase_messaging: ^16.1.1
  firebase_core: ^4.4.0
  flutter_local_notifications: ^18.0.1
  onesignal_flutter: ^5.2.4
  record: 5.1.0
  audioplayers: 5.2.1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# PARCHE DE COMPATIBILIDAD: Forzamos versiones que no den error de interfaz
dependency_overrides:
  record_platform_interface: 1.4.3
  record_linux: 0.7.2

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#ffffff"
    theme_color: "#2196f3"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
