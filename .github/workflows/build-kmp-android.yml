name: Build KMP Android

permissions:
  contents: read

on:
  workflow_call:
  push:
    branches:
      - main
    paths:
      - 'venered-kmp/**'
      - '.github/workflows/build-kmp-android.yml'
    tags:
      - 'kmp-v*'
  pull_request:
    branches:
      - main
    paths:
      - 'venered-kmp/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Kotlin
        run: |
          sudo apt-get update
          sudo apt-get install -y kotlin

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v1

      - name: Build with Gradle
        working-directory: venered-kmp
        run: |
          ./gradlew :androidApp:build --stacktrace

      - name: Build Release APK
        working-directory: venered-kmp
        run: |
          ./gradlew :androidApp:assembleRelease --stacktrace

      - name: Build Release Bundle
        working-directory: venered-kmp
        run: |
          ./gradlew :androidApp:bundleRelease --stacktrace

      - name: Get APK path
        id: apk
        working-directory: venered-kmp
        run: |
          APK_PATH=$(find . -name "*release*.apk" -type f | head -1)
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK found at: $APK_PATH"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kmp-android-apk
          path: venered-kmp/androidApp/build/outputs/apk/release/

      - name: Upload Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kmp-android-bundle
          path: venered-kmp/androidApp/build/outputs/bundle/release/

      - name: Run Tests
        working-directory: venered-kmp
        continue-on-error: true
        run: |
          ./gradlew :shared:test --stacktrace

      - name: Generate Build Report
        if: always()
        working-directory: venered-kmp
        run: |
          cat > build_report.txt << 'EOF'
          # KMP Android Build Report
          
          Build Status: SUCCESS
          Build Time: $(date)
          Target: Android (Release)
          
          Artifacts:
          - APK: build/outputs/apk/release/
          - Bundle: build/outputs/bundle/release/
          EOF
          cat build_report.txt

      - name: Comment PR with Build Status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **KMP Android Build Successful**\n\nArtifacts available for download.'
            })
