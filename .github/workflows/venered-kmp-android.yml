name: Build KMP Android

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - 'kmp-v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Restore Google Services JSON
        env:
          GOOGLE_SERVICES_JSON_SECRET: ${{ secrets.GOOGLE_SERVICES_JSON || secrets.GOOGLE_SERVICES_JSON_SECRET }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_SECRET" ]; then
            echo "::warning::Missing GOOGLE_SERVICES_JSON secret - using dummy google-services.json"
            cat > venered-kmp/androidApp/google-services.json << 'EOF'
            {
              "project_info": { "project_number": "123", "project_id": "dummy" },
              "client": [
                {
                  "client_info": { "mobilesdk_app_id": "1:123:android:abc", "android_client_info": { "package_name": "com.juanpiece.venered" } },
                  "api_key": [{ "current_key": "dummy" }],
                  "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
                },
                {
                  "client_info": { "mobilesdk_app_id": "1:123:android:def", "android_client_info": { "package_name": "com.venered.social" } },
                  "api_key": [{ "current_key": "dummy" }],
                  "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
                }
              ],
              "configuration_version": "1"
            }
          EOF
          else
            printf '%s' "$GOOGLE_SERVICES_JSON_SECRET" > venered-kmp/androidApp/google-services.json
          fi

      - name: Restore Keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > venered-release.jks
          else
            echo "::warning::Missing RELEASE_KEYSTORE_BASE64 secret - APK will be unsigned or use dummy"
            # Si no hay keystore, el build podría fallar si signingConfig es obligatorio.
            # Podríamos crear un keystore temporal o dejar que falle para alertar al usuario.
          fi

      - name: Make Gradlew Executable
        working-directory: venered-kmp
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build and Assemble Release
        working-directory: venered-kmp
        env:
          RELEASE_STORE_FILE: ../venered-release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD || 'JuanPiece2026*' }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS || 'juanpiece' }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD || 'JuanPiece2026*' }}
        run: |
          ./gradlew :androidApp:assembleRelease --stacktrace

      - name: Build Release Bundle
        working-directory: venered-kmp
        run: |
          ./gradlew :androidApp:bundleRelease --stacktrace

      - name: Get APK path
        id: apk
        working-directory: venered-kmp
        run: |
          APK_PATH=$(find . -name "*release*.apk" -type f | head -1)
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK found at: $APK_PATH"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kmp-android-apk
          path: venered-kmp/androidApp/build/outputs/apk/release/

      - name: Upload Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kmp-android-bundle
          path: venered-kmp/androidApp/build/outputs/bundle/release/

      - name: Run Tests
        working-directory: venered-kmp
        continue-on-error: true
        run: |
          ./gradlew :shared:test --stacktrace

      - name: Generate Build Report
        if: always()
        working-directory: venered-kmp
        run: |
          cat > build_report.txt << 'EOF'
          # KMP Android Build Report
          
          Build Status: SUCCESS
          Build Time: $(date)
          Target: Android (Release)
          
          Artifacts:
          - APK: build/outputs/apk/release/
          - Bundle: build/outputs/bundle/release/
          EOF
          cat build_report.txt

      - name: Comment PR with Build Status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **KMP Android Build Successful**\n\nArtifacts available for download.'
            })
