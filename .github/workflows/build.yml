name: Build Flutter App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # He mantenido tu versión, pero asegúrate de que sea la que usas localmente
          flutter-version: '3.35.2'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Send APK to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          document: build/app/outputs/flutter-apk/app-release.apk
          message: |
            🎉 **Nueva APK de Venered Social Disponible** 🎉

            **Versión:** ${{ github.ref_name }}
            **Estado:** ✅ Éxito

            ¡Descarga la última versión adjunta!