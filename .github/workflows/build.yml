name: Build Venered Social

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Restore Google Services JSON
        env:
          GOOGLE_SERVICES_JSON_SECRET: ${{ secrets.GOOGLE_SERVICES_JSON || secrets.GOOGLE_SERVICES_JSON_SECRET }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_SECRET" ]; then
            echo "::error::Missing GOOGLE_SERVICES_JSON secret"
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON_SECRET" > android/app/google-services.json
          python3 -c "import json, sys; data=json.load(open('android/app/google-services.json')); print('google-services.json OK')" || { echo '::error::google-services.json is malformed'; exit 1; }

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APKs (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Compress APKs to ZIP
        run: zip -j venered_social_v1.0.zip build/app/outputs/flutter-apk/*.apk

      - name: Read Progress Summary
        id: progress
        run: |
          SUMMARY=$(cat progress_summary.md)
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            venered_social_v1.0.zip
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/bundle/release/app-release.aab
          name: "Venered Social v1.0 (Oficial)"
          body: ${{ steps.progress.outputs.summary }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Notification to Telegram
        if: startsWith(github.ref, 'refs/tags/')
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          document: venered_social_v1.0.zip
          message: |
            🎉 **¡Venered Social v1.0 Actualizada!** 🎉
            
            Se han implementado las siguientes funciones:
            ${{ steps.progress.outputs.summary }}
            
            🔗 **Enlace del Release en GitHub:**
            https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
            
            📥 **Archivo ZIP adjunto.**
