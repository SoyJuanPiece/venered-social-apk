name: Build Venered Social

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Restore Google Services JSON
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import sys

          secret = os.getenv("GOOGLE_SERVICES_JSON_SECRET", "").strip()
          if not secret:
            print("::error::Missing GOOGLE_SERVICES_JSON secret")
            sys.exit(1)

          os.makedirs("android/app", exist_ok=True)

          candidates = [secret]
          try:
            candidates.append(base64.b64decode(secret).decode("utf-8"))
          except Exception:
            pass

          for raw in candidates:
            try:
              data = json.loads(raw)
              if isinstance(data, str):
                data = json.loads(data)
              if isinstance(data, dict):
                with open("android/app/google-services.json", "w", encoding="utf-8") as f:
                  json.dump(data, f, indent=2)
                print("google-services.json restored successfully")
                sys.exit(0)
            except Exception:
              continue

          print("::error::GOOGLE_SERVICES_JSON is not valid JSON (raw, escaped JSON string, or base64 JSON)")
          sys.exit(1)
          PY
        env:
          GOOGLE_SERVICES_JSON_SECRET: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APKs (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Compress APKs to ZIP
        run: zip -j venered_social_v1.0.zip build/app/outputs/flutter-apk/*.apk

      - name: Read Progress Summary
        id: progress
        run: |
          SUMMARY=$(cat progress_summary.md)
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            venered_social_v1.0.zip
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/bundle/release/app-release.aab
          name: "Venered Social v1.0 (Oficial)"
          body: ${{ steps.progress.outputs.summary }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Notification to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          document: venered_social_v1.0.zip
          message: |
            🎉 **¡Venered Social v1.0 Actualizada!** 🎉
            
            Se han implementado las siguientes funciones:
            ${{ steps.progress.outputs.summary }}
            
            🔗 **Enlace del Release en GitHub:**
            https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
            
            📥 **Archivo ZIP adjunto.**
