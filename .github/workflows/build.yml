name: Build Flutter App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Cache Flutter dependencies
      - name: Cache Flutter dependencies
        uses: actions/cache@v3
        with:
          path: /opt/hostedtoolcache/flutter/
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.2'

      # Cache Gradle dependencies
      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: flutter pub get

      - name: Delete old tags and releases
        run: |
          # Obtener todos los tags de release y borrarlos uno por uno (ignorar errores)
          RELEASES=$(gh release list --limit 100 --json tagName --jq '.[].tagName' || echo "")
          for release in $RELEASES; do
            if [ -n "$release" ]; then
              echo "Borrando release y tag: $release"
              gh release delete "$release" --yes --cleanup-tag || true
            fi
          done
          
          # Borrar tags locales que queden (ignorar errores)
          git tag -l | xargs -r git tag -d || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build APKs (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build App Bundle (.aab)
        run: flutter build appbundle --release

      - name: Compress APKs to ZIP
        run: |
          zip -j venered_social_v1.0.zip build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/app-x86_64-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            venered_social_v1.0.zip
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/bundle/release/app-release.aab
          name: "Venered Social v1.0 (Lanzamiento Oficial)"
          body: |
            🚀 **¡Lanzamiento Oficial de Venered Social v1.0!** 🚀

            Esta versión marca un antes y un después en la aplicación, con un enfoque total en el diseño "Premium" y la estabilidad.

            ### ✨ Novedades Visuales (Rediseño Total)
            *   **Tipografía de Élite:** Integración de Google Fonts (Poppins) en toda la aplicación.
            *   **Estética Vibrante:** Nueva paleta de colores con gradientes Indigo/Rosa y bordes redondeados (24px).
            *   **Pantallas Renovadas:** Rediseño completo de Login, Registro, Home Feed, Perfil y Explorar.
            *   **Identidad de Marca:** Logo estilizado con gradientes en puntos clave.

            ### 🛠️ Mejoras Técnicas y Robustez
            *   **Perfil Sin Errores:** Se corrigió el cargado infinito y se añadió manejo de errores con botón de reintento.
            *   **Deep Linking:** Ahora puedes confirmar tu correo de Supabase y volver automáticamente a la app (venered://login).
            *   **Base de Datos:** Migración a un nuevo proyecto optimizado en Supabase.
            *   **Optimización de Compilación:** Ahora se incluyen APKs por arquitectura y el App Bundle (.aab).

            ### 📦 Archivos Incluidos
            *   **ZIP Comprimido:** Con todos los APKs.
            *   **Split APKs:** Optimizados para cada tipo de móvil (v7a, v8a, x64).
            *   **App Bundle (.aab):** Versión oficial para subir a la Play Store.

            *Nota: Se han eliminado todos los releases y tags anteriores para mantener esta versión como la base oficial.*
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Send ZIP to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          document: venered_social_v1.0.zip
          message: |
            🎉 **Venered Social v1.0 (Oficial)** 🎉

            **Estado:** ✅ Lanzamiento Exitoso
            **Nota:** Esta es la versión oficial 1.0. Se han eliminado las versiones anteriores del servidor.

            📥 **Archivo ZIP con APKs adjunto.**

            🌐 **Descarga directa:**
            https://github.com/${{ github.repository }}/releases/latest

            ¡Disfruta la nueva experiencia premium de Venered!