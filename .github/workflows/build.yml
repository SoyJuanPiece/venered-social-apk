name: Build Venered Social

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Restore Google Services JSON
        run: echo "$GOOGLE_SERVICES_JSON_SECRET" > android/app/google-services.json
        env:
          GOOGLE_SERVICES_JSON_SECRET: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APKs (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Compress APKs to ZIP
        run: zip -j venered_social_v1.0.zip build/app/outputs/flutter-apk/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            venered_social_v1.0.zip
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/bundle/release/app-release.aab
          name: "Venered Social v1.0 (Oficial)"
          body: "🚀 Lanzamiento oficial de Venered Social con soporte para todas las arquitecturas."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send ZIP to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          document: venered_social_v1.0.zip
          message: |
            🎉 **¡Venered Social v1.0 Lista!** 🎉
            
            Se han generado los APKs para todas las arquitecturas.
            
            📥 **Archivo ZIP adjunto.**
            🚀 Disfruta la experiencia Premium.
