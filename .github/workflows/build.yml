name: Build Venered Social (Flutter)

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
      - '[0-9]*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Restore Google Services JSON
        env:
          GOOGLE_SERVICES_JSON_SECRET: ${{ secrets.GOOGLE_SERVICES_JSON || secrets.GOOGLE_SERVICES_JSON_SECRET }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_SECRET" ]; then
            echo "::warning::Missing GOOGLE_SERVICES_JSON secret - skipping google-services.json setup"
            # Create a placeholder file to prevent build failure
            echo '{"placeholder": true}' > android/app/google-services.json
          else
            printf '%s' "$GOOGLE_SERVICES_JSON_SECRET" > android/app/google-services.json
            python3 -c "import json, sys; data=json.load(open('android/app/google-services.json')); print('google-services.json OK')" || { echo '::error::google-services.json is malformed'; exit 1; }
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        continue-on-error: true
        run: flutter test

      - name: Build APKs (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Compress APKs to ZIP
        run: zip -j venered_social_flutter_v1.0.zip build/app/outputs/flutter-apk/*.apk

      - name: Read Progress Summary
        id: progress
        continue-on-error: true
        run: |
          if [ -f progress_summary.md ]; then
            SUMMARY=$(cat progress_summary.md)
          else
            SUMMARY="No progress summary available"
          fi
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: flutter-apks
          path: build/app/outputs/flutter-apk/

      - name: Upload AAB Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: flutter-bundle
          path: build/app/outputs/bundle/release/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            venered_social_flutter_v1.0.zip
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/bundle/release/app-release.aab
          name: "Venered Social v1.0 - Flutter (Oficial)"
          body: ${{ steps.progress.outputs.summary }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
