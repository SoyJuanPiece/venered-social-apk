name: Build KMP iOS

permissions:
  contents: read

on:
  workflow_call:
  push:
    branches:
      - main
    paths:
      - 'venered-kmp/**'
    tags:
      - 'kmp-v*'
  pull_request:
    branches:
      - main
    paths:
      - 'venered-kmp/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: venered-kmp/iosApp/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('venered-kmp/iosApp/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('venered-kmp/**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-wrapper-

      - name: Install pods
        working-directory: venered-kmp/iosApp
        run: pod install --repo-update

      - name: Build Shared Framework
        working-directory: venered-kmp
        run: |
          ./gradlew :shared:build -x test

      - name: Build iOS App (Debug)
        working-directory: venered-kmp/iosApp
        run: |
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            -derivedDataPath build \
            -arch arm64 \
            build

      - name: Build iOS App (Release)
        working-directory: venered-kmp/iosApp
        continue-on-error: true
        run: |
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 \
            build

      - name: Create Archive
        working-directory: venered-kmp/iosApp
        continue-on-error: true
        run: |
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 \
            -archivePath build/Runner.xcarchive \
            archive

      - name: Export IPA
        working-directory: venered-kmp/iosApp
        continue-on-error: true
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportOptionsPlist build/exportOptions.plist \
            -exportPath build/ipa

      - name: Run Tests
        working-directory: venered-kmp
        continue-on-error: true
        run: |
          ./gradlew :shared:test

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: venered-kmp/iosApp/build/

      - name: Generate Build Report
        if: always()
        working-directory: venered-kmp/iosApp
        run: |
          cat > build_report.txt << 'EOF'
          # KMP iOS Build Report
          
          Build Status: COMPLETED
          Build Time: $(date)
          Target: iOS (arm64)
          Platform: macOS
          
          Build Artifacts:
          - Debug Build: build/Debug/
          - Release Archive: build/Runner.xcarchive/
          EOF
          cat build_report.txt

      - name: Comment PR with Build Status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **KMP iOS Build Completed**\n\nDebug build successful. Archive available in artifacts.'
            })
